name: 'amplifier-app-actions'
description: 'Run Amplifier-powered AI agents in GitHub Actions workflows'
author: 'Microsoft MADE:Explorations Team'

inputs:
  prompt:
    description: 'Inline prompt to pass to the Amplifier session'
    required: false
    default: ''
  prompt_source:
    description: 'Path or URL to a prompt file (overrides prompt if set)'
    required: false
    default: ''
  recipe_source:
    description: 'Path or URL to an Amplifier recipe YAML file'
    required: false
    default: ''
  attractor_source:
    description: 'Path or URL to an attractor/context file'
    required: false
    default: ''
  provider:
    description: 'AI provider to use (anthropic, openai, or github-copilot)'
    required: false
    default: 'anthropic'
  model:
    description: 'Model name override (leave empty to use provider default)'
    required: false
    default: ''
  bundle:
    description: >-
      Bundle to use for the Amplifier session. Built-in aliases:
        github-tools            — foundation + 3 GitHub tools (default)
        github-tools-dtu        — github-tools + digital-twin-universe (Incus/DTU)
        github-tools-amplifier-dev — github-tools-dtu + Amplifier-dev tooling
      Or pass any local path or git+https:// URL.
    required: false
    default: 'github-tools'
  github_token:
    description: 'GitHub token for API calls (defaults to GITHUB_TOKEN)'
    required: false
    default: '${{ github.token }}'
  enable_reproduction:
    description: >-
      Install Incus on the runner for container-based reproduction environments.
      When true and bundle is 'github-tools' (the default), automatically upgrades
      to 'github-tools-dtu' which includes digital-twin-universe for DTU support.
      Requires ubuntu-latest full VM runner (not container-based). Ubuntu 24.04
      ships Incus 6.0.0 which has an AppArmor bug blocking dockerd; this step
      installs from the Zabbly stable channel instead.
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Setup uv
      uses: astral-sh/setup-uv@v4

    - name: Set up Python environment
      shell: bash
      run: |
        echo "::group::uv sync"
        uv sync --project ${{ github.action_path }}
        echo "::endgroup::"

    - name: Set up Incus
      if: inputs.enable_reproduction == 'true'
      shell: bash
      run: |
        echo "::group::Install Incus (Zabbly stable)"
        curl https://pkgs.zabbly.com/get/incus-stable | sudo sh -x
        echo "::endgroup::"

        echo "::group::Fix Docker/Incus iptables conflict"
        sudo nft flush ruleset
        echo "::endgroup::"

        echo "::group::Initialize Incus"
        sudo incus admin waitready
        sudo incus admin init --auto
        echo "::endgroup::"

        echo "::group::Grant runner access to Incus socket"
        # amplifier-digital-twin calls the Incus daemon directly (no sudo).
        # Amplifier's bash hook blocks privilege escalation in strict mode, so
        # sudo incus would be denied. usermod group changes don't take effect
        # in the current shell, so chmod 666 is the only reliable approach.
        # The socket is already isolated within the GHA runner environment.
        sudo chmod 666 /var/lib/incus/unix.socket
        echo "::endgroup::"

    - name: Run Amplifier action (prompt / recipe)
      if: inputs.attractor_source == ''
      shell: bash
      env:
        INPUT_PROMPT: ${{ inputs.prompt }}
        INPUT_PROMPT_SOURCE: ${{ inputs.prompt_source }}
        INPUT_RECIPE_SOURCE: ${{ inputs.recipe_source }}
        INPUT_ATTRACTOR_SOURCE: ''
        INPUT_PROVIDER: ${{ inputs.provider }}
        INPUT_MODEL: ${{ inputs.model }}
        INPUT_BUNDLE: ${{ inputs.bundle }}
        INPUT_GITHUB_TOKEN: ${{ inputs.github_token }}
        INPUT_ENABLE_REPRODUCTION: ${{ inputs.enable_reproduction }}
      run: uv run --project ${{ github.action_path }} python ${{ github.action_path }}/main.py

    - name: Run Amplifier action (attractor pipeline — direct)
      if: inputs.attractor_source != ''
      shell: bash
      env:
        # Issue event data — injected via env vars (safe from shell injection)
        ISSUE_NUMBER: ${{ github.event.issue.number }}
        ISSUE_TITLE: ${{ github.event.issue.title }}
        ISSUE_BODY: ${{ github.event.issue.body }}
        ISSUE_REPO: ${{ github.repository }}
      run: |
        # Resolve built-in bundle aliases → file:// URIs.
        # Arbitrary git+https:// or other URIs pass through unchanged.
        BUNDLE="${{ inputs.bundle }}"
        case "$BUNDLE" in
          github-tools|github-tools-dtu|github-tools-amplifier-dev|triage-safe)
            BUNDLE="file://${{ github.action_path }}/bundles/${BUNDLE}.bundle.md"
            ;;
        esac

        # Build the goal string from event fields.
        # $'\n\n' gives a literal double-newline without subshell.
        GOAL="Issue #${ISSUE_NUMBER} in ${ISSUE_REPO}: ${ISSUE_TITLE}"
        [ -n "${ISSUE_BODY}" ] && GOAL="${GOAL}"$'\n\n'"${ISSUE_BODY}"

        # Invoke the pipeline directly — no intermediate Python process.
        # This gives run_pipeline a top-level CLI session where session.spawn
        # works at full depth, so AmplifierBackend can spawn per-node child
        # sessions for investigate, quality_eval, comment_draft, etc.
        uv run --project ${{ github.action_path }} amplifier tool invoke run_pipeline \
          -b "${BUNDLE}" \
          "dot_file=${GITHUB_WORKSPACE}/${{ inputs.attractor_source }}" \
          "goal=${GOAL}"
