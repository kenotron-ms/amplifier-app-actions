name: 'amplifier-app-actions'
description: 'Run Amplifier-powered AI agents in GitHub Actions workflows'
author: 'Microsoft MADE:Explorations Team'

inputs:
  prompt:
    description: 'Inline prompt to pass to the Amplifier session'
    required: false
    default: ''
  prompt_source:
    description: 'Path or URL to a prompt file (overrides prompt if set)'
    required: false
    default: ''
  recipe_source:
    description: 'Path or URL to an Amplifier recipe YAML file'
    required: false
    default: ''
  attractor_source:
    description: 'Path or URL to an attractor/context file'
    required: false
    default: ''
  provider:
    description: 'AI provider to use (anthropic, openai, or github-copilot)'
    required: false
    default: 'anthropic'
  model:
    description: 'Model name override (leave empty to use provider default)'
    required: false
    default: ''
  github_token:
    description: 'GitHub token for API calls (defaults to GITHUB_TOKEN)'
    required: false
    default: '${{ github.token }}'
  enable_reproduction:
    description: >-
      Install Incus on the runner for container-based reproduction environments.
      Requires ubuntu-latest full VM runner (not container-based). Ubuntu 24.04
      ships Incus 6.0.0 which has an AppArmor bug blocking dockerd; this step
      installs from the Zabbly stable channel instead.
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Setup uv
      uses: astral-sh/setup-uv@v4

    - name: Sync Python environment
      shell: bash
      run: uv sync --project ${{ github.action_path }}

    - name: Install Incus (Zabbly stable)
      if: inputs.enable_reproduction == 'true'
      shell: bash
      run: curl https://pkgs.zabbly.com/get/incus-stable | sudo sh -x

    - name: Fix Docker/Incus iptables conflict
      if: inputs.enable_reproduction == 'true'
      shell: bash
      run: sudo nft flush ruleset

    - name: Init Incus
      if: inputs.enable_reproduction == 'true'
      shell: bash
      run: |
        sudo incus admin waitready
        sudo incus admin init --auto

    - name: Run Amplifier action
      shell: bash
      env:
        INPUT_PROMPT: ${{ inputs.prompt }}
        INPUT_PROMPT_SOURCE: ${{ inputs.prompt_source }}
        INPUT_RECIPE_SOURCE: ${{ inputs.recipe_source }}
        INPUT_ATTRACTOR_SOURCE: ${{ inputs.attractor_source }}
        INPUT_PROVIDER: ${{ inputs.provider }}
        INPUT_MODEL: ${{ inputs.model }}
        INPUT_GITHUB_TOKEN: ${{ inputs.github_token }}
      run: uv run --project ${{ github.action_path }} python ${{ github.action_path }}/main.py
