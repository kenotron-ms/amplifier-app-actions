# validate-attractor.yaml
#
# Validates amplifier-app-actions in attractor mode (2-node convergence) against local Gitea.
#
# What this tests:
#   - resolve_instruction picks up attractor_source file path
#   - attractor tool is mounted and accessible from cli.py
#   - 2-node graph converges (classify → report)
#   - report node calls github_post_comment with findings
#
# Prerequisites:
#   1. Run host setup to start Gitea and mirror the action repo.
#   2. ANTHROPIC_API_KEY must be set on the host.
#
# Launch:
#   amplifier-digital-twin launch validate-attractor.yaml \
#     --var GITEA_URL=$GITEA_URL \
#     --var GITEA_TOKEN=$GITEA_TOKEN

name: validate-attractor
description: >
  End-to-end validation of amplifier-app-actions in attractor mode.
  Runs amplifier-triage with --attractor-source against a Gitea issue.
  Verifies that at least one comment is posted to the issue by the
  report node calling github_post_comment.

base:
  image: ubuntu:24.04

vars:
  - name: GITEA_URL
    required: true
    description: "Host Gitea base URL, e.g. http://10.86.0.1:10210"
  - name: GITEA_TOKEN
    required: true
    description: "Gitea admin API token"
  - name: core_ref
    default: ""
    description: "amplifier-core ref override (empty = use published PyPI)"
  - name: foundation_ref
    default: ""
    description: "amplifier-foundation ref override (empty = use GitHub main)"

passthrough:
  allow_external: true
  services:
    - name: anthropic
      key_env: ANTHROPIC_API_KEY

url_rewrites:
  auth:
    username: admin
    token_var: GITEA_TOKEN
  # Keep uv's GitHub fast path disabled so `uv tool install` routes through
  # git fetch and these rules actually apply. See docs/profiles.md for the
  # reasoning.
  allow_uv_github_fast_path: false
  default_match_mode: boundary
  rules:
    # Redirect action repo installs to local Gitea mirror
    - match: github.com/microsoft/amplifier-app-actions
      target: ${GITEA_URL}/admin/amplifier-app-actions
    - match: github.com/microsoft/amplifier-foundation
      target: ${GITEA_URL}/admin/amplifier-foundation

# ---------------------------------------------------------------------------
# Generic dependency override pattern
#
# core_ref and foundation_ref are Amplifier-specific examples. Any `*_ref`
# var can point to a Gitea-mirrored dependency. When the ref is empty
# (default), the published PyPI version is used instead.
#
# Usage: mirror local code first, then pass the ref at launch time:
#   amplifier-gitea mirror-from-local ~/repos/amplifier-core \
#     --to admin/amplifier-core
#   amplifier-digital-twin launch validate-attractor.yaml \
#     --var GITEA_URL=$GITEA_URL \
#     --var GITEA_TOKEN=$GITEA_TOKEN \
#     --var core_ref=main
#
# When core_ref is empty (default), the published PyPI version is used.
# ---------------------------------------------------------------------------
pypi_overrides:
  packages:
    - name: amplifier-core
      wheel_from_git:
        repo: ${GITEA_URL}/admin/amplifier-core.git
        ref: ${core_ref}
        username: admin
        token_var: GITEA_TOKEN
        build_cmd: uv build --wheel
        wheel_glob: dist/amplifier_core-*.whl

provision:
  setup_cmds:
    # --- System dependencies ---
    - apt-get update -qq && apt-get install -y -q git curl jq python3

    # --- uv ---
    - curl -LsSf https://astral.sh/uv/install.sh | sh

    # --- Create test org, attractor-test-repo, issue #1, and labels in Gitea ---
    - |
      # Create test-org (ignore 422 if already exists)
      curl -sf -X POST ${GITEA_URL}/api/v1/orgs \
        -H 'Content-Type: application/json' \
        -H "Authorization: Bearer ${GITEA_TOKEN}" \
        -d '{"username":"test-org","visibility":"private"}' > /dev/null || true

      # Create attractor-test-repo
      curl -sf -X POST ${GITEA_URL}/api/v1/orgs/test-org/repos \
        -H 'Content-Type: application/json' \
        -H "Authorization: Bearer ${GITEA_TOKEN}" \
        -d '{"name":"attractor-test-repo","private":true,"auto_init":true}' > /dev/null || true

      # Wait for repo to initialize
      sleep 3

      # Create issue #1 (our test target)
      curl -sf -X POST ${GITEA_URL}/api/v1/repos/test-org/attractor-test-repo/issues \
        -H 'Content-Type: application/json' \
        -H "Authorization: Bearer ${GITEA_TOKEN}" \
        -d '{"title":"Connection pool exhausted under load","body":"When the service receives more than 100 req/s, it throws ConnectionPoolExhaustedException.\n\nStack trace:\n  ConnectionPoolExhaustedException: Pool size 10 exhausted after 30s timeout\n\nExpected: requests should queue or return 503\nActual: unhandled exception crashes worker threads"}' \
        > /tmp/issue_result.json

      ISSUE_NUMBER=$(jq -r '.number' /tmp/issue_result.json)
      echo "Created issue #${ISSUE_NUMBER} in test-org/attractor-test-repo"

      # Create labels the attractor can apply
      for label in bug feature-request question performance needs-investigation; do
        curl -sf -X POST ${GITEA_URL}/api/v1/repos/test-org/attractor-test-repo/labels \
          -H 'Content-Type: application/json' \
          -H "Authorization: Bearer ${GITEA_TOKEN}" \
          -d "{\"name\":\"${label}\",\"color\":\"#0075ca\"}" > /dev/null || true
      done

      echo "Labels created"

    # --- Install amplifier-app-actions from local Gitea mirror ---
    - |
      export PATH="/root/.local/bin:$PATH"

      # url_rewrites redirects this clone to ${GITEA_URL}/admin/amplifier-app-actions
      uv tool install -vv \
        "git+https://github.com/microsoft/amplifier-app-actions"

      amplifier-triage --help
      echo "amplifier-triage installed successfully"

    # --- Write the attractor DOT to /root/triage.dot ---
    - |
      cat > /root/triage.dot << 'DOTEOF'
      digraph triage {
        label="Issue Triage Attractor (DTU Test)"
        rankdir=TB

        classify [
          label="Classify Issue"
          description="Read the issue title and body. Determine the type (bug, feature-request, question, performance) and severity. Add the appropriate label using github_add_label. Output: classification summary."
        ]

        report [
          label="Post Report"
          description="Using the classification from the previous step, post a structured triage comment using github_post_comment. Include: type, severity, one-sentence summary, and recommended next action."
        ]

        classify -> report
      }
      DOTEOF
      echo "Attractor DOT written to /root/triage.dot"

    # --- Write the synthetic GitHub issue event JSON ---
    - |
      cat > /root/event.json << 'EVEOF'
      {
        "action": "opened",
        "issue": {
          "number": 1,
          "title": "Connection pool exhausted under load",
          "body": "When the service receives more than 100 req/s, it throws ConnectionPoolExhaustedException.\n\nPool size 10 exhausted after 30s timeout.",
          "user": {"login": "test-user"},
          "labels": []
        },
        "repository": {
          "name": "attractor-test-repo",
          "owner": {"login": "test-org"}
        }
      }
      EVEOF
      echo "Event JSON written to /root/event.json"

    # --- Run the action in attractor mode ---
    - |
      export PATH="/root/.local/bin:$PATH"
      set -e

      GITHUB_API_URL="${GITEA_URL}/api/v1" \
      GITHUB_CLONE_URL="${GITEA_URL}" \
      GITHUB_TOKEN="${GITEA_TOKEN}" \
      amplifier-triage \
        --attractor-source /root/triage.dot \
        --provider anthropic \
        --github-token "${GITEA_TOKEN}" \
        --event-path /root/event.json

      echo "Attractor action completed"

    # --- VERIFY: assert at least one comment was posted ---
    - |
      COMMENT_COUNT=$(curl -sf \
        -H "Authorization: Bearer ${GITEA_TOKEN}" \
        "${GITEA_URL}/api/v1/repos/test-org/attractor-test-repo/issues/1/comments" \
        | jq 'length')

      echo "Comments on issue #1: ${COMMENT_COUNT}"

      if [ "${COMMENT_COUNT}" -lt 1 ]; then
        echo "VALIDATION FAILED: Expected >= 1 comment, got ${COMMENT_COUNT}"
        exit 1
      fi

      COMMENT_BODY=$(curl -sf \
        -H "Authorization: Bearer ${GITEA_TOKEN}" \
        "${GITEA_URL}/api/v1/repos/test-org/attractor-test-repo/issues/1/comments" \
        | jq -r '.[0].body')

      echo "First comment body: ${COMMENT_BODY}"

      echo "VALIDATION PASSED: At least one comment posted to issue #1"
      touch /root/validation.done

readiness:
  - name: validate-attractor-passed
    command: "test -f /root/validation.done"
