name: repro-routing-matrix-3
description: >
  Reproduces issue #3 in kenotron-ms/amplifier-actions-example: sub-agent
  sessions ignore routing matrix fallback chains. Tests current HEAD of
  amplifier-core, amplifier-bundle-routing-matrix, and amplifier-foundation
  on github.com/microsoft, served via a local Gitea mirror.

base:
  image: ubuntu:24.04

url_rewrites:
  auth:
    username: admin
    token_var: GITEA_TOKEN
  allow_uv_github_fast_path: false
  default_match_mode: boundary
  rules:
    - match: github.com/microsoft/amplifier-core
      target: ${GITEA_URL}/admin/amplifier-core
    - match: github.com/microsoft/amplifier-bundle-routing-matrix
      target: ${GITEA_URL}/admin/amplifier-bundle-routing-matrix
    - match: github.com/microsoft/amplifier-foundation
      target: ${GITEA_URL}/admin/amplifier-foundation

passthrough:
  allow_external: true
  services:
    - name: anthropic
      key_env: ANTHROPIC_API_KEY

provision:
  setup_cmds:
    - apt-get update && apt-get install -y --no-install-recommends git curl ca-certificates python3 python3-venv python3-pip
    - curl -LsSf https://astral.sh/uv/install.sh | sh

    # Install Amplifier CLI (general validation). url_rewrites redirects
    # any github.com clones that match the rules above into Gitea.
    - |
      export PATH="/root/.local/bin:$PATH"
      uv tool install git+https://github.com/microsoft/amplifier

    # Minimal settings.yaml so amplifier CLI is operable. The verification
    # script only inspects session config and does not perform LLM calls,
    # but session creation needs at least one provider configured.
    - |
      mkdir -p /root/.amplifier
      cat > /root/.amplifier/settings.yaml << 'EOF'
      config:
        providers:
          - module: provider-anthropic
            source: git+https://github.com/microsoft/amplifier-module-provider-anthropic@main
            config:
              api_key: ${ANTHROPIC_API_KEY}
              default_model: claude-sonnet-4-5
      EOF

    # Create a dedicated venv for running the verification script with
    # amplifier-foundation + amplifier-core available as Python imports.
    # amplifier-core comes from PyPI (pre-built wheel). amplifier-foundation
    # is installed from git so url_rewrites pull HEAD from Gitea.
    - |
      python3 -m venv /opt/verify-venv
      /opt/verify-venv/bin/pip install --upgrade pip
      /opt/verify-venv/bin/pip install amplifier-core
      /opt/verify-venv/bin/pip install \
        "git+https://github.com/microsoft/amplifier-foundation@main"

    # Sanity: confirm both packages importable and at expected versions
    - |
      /opt/verify-venv/bin/python -c "import amplifier_core, amplifier_foundation; print('core:', amplifier_core.__version__ if hasattr(amplifier_core, '__version__') else 'n/a'); print('foundation:', amplifier_foundation.__version__ if hasattr(amplifier_foundation, '__version__') else 'n/a')"

    - amplifier --version
    - mkdir -p /tmp/work

readiness:
  - name: amplifier-installed
    command: "PATH=/root/.local/bin:$PATH amplifier --version"
  - name: foundation-importable
    command: "/opt/verify-venv/bin/python -c 'from amplifier_foundation import load_bundle; print(\"ok\")'"
