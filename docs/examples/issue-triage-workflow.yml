# Reference workflow for AI-assisted issue triage.
#
# Copy this file to .github/workflows/issue-triage.yml in your repository.
#
# Prerequisites:
#   1. Set the ANTHROPIC_API_KEY repository secret.
#   2. Ensure these labels exist: bug, feature-request, question, documentation

name: Issue Triage

on:
  issues:
    types: [opened]

permissions:
  issues: write
  contents: read

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - uses: microsoft/amplifier-app-actions@v1
        with:
          bundle: git+https://github.com/kenotron-ms/amplifier-bundle-dev-support@main#subdirectory=bundles/issue-triage.bundle.md
          prompt: |
            A new issue was opened. Triage it.
          provider: anthropic
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
